<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Smart Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #e2e8f0; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
    .btn-active { transition: all 0.2s ease; }
    .btn-active:active { transform: scale(0.95); }
    .btn-active:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .gradient-text { background: linear-gradient(45deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); } 50% { box-shadow: 0 0 50px rgba(16, 185, 129, 0.4); } }
    .glow { animation: glow 3s infinite; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="glass p-8 rounded-3xl max-w-md w-full fade-in glow">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black mb-2">
        <span class="gradient-text">Smart Wallet</span>
      </h1>
      <p class="text-slate-400">نسخة المؤسسين - إدارة مصاريفك بذكاء</p>
    </div>

    <div class="space-y-4">
      <button id="googleLoginBtn" class="w-full bg-white text-gray-800 py-3 rounded-xl font-bold btn-active flex items-center justify-center gap-3">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        الدخول بحساب جوجل
      </button>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-700"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-slate-800 text-slate-400">أو</span>
        </div>
      </div>

      <input id="emailInput" type="email" class="w-full bg-slate-800 p-3 rounded-xl focus:ring-2 focus:ring-emerald-500 transition" placeholder="الإيميل">
      <input id="passwordInput" type="password" class="w-full bg-slate-800 p-3 rounded-xl focus:ring-2 focus:ring-emerald-500 transition" placeholder="كلمة السر">
      
      <div class="flex gap-3">
        <button id="loginBtn" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold btn-active">دخول</button>
        <button id="signupBtn" class="flex-1 bg-sky-600 py-3 rounded-xl font-bold btn-active">حساب جديد</button>
      </div>

      <p id="errorMessage" class="text-red-400 text-sm text-center hidden"></p>
    </div>

    <div class="mt-8 pt-6 border-t border-slate-700 text-center">
      <p class="text-xs text-slate-500">عرض المؤسسين: Pro بـ 20 جنيه/شهر فقط</p>
      <p class="text-xs text-emerald-400 mt-1">التفعيل فوري على واتساب 01121898023</p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
